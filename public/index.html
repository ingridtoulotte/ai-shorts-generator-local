<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎬 AI Shorts Studio — Wan 2.2</title>
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/847/847969.png" />
  <style>
    :root {
      --bg1:#0b0d1a; --bg2:#1d1430; --panel:rgba(255,255,255,.055); --panel2:rgba(255,255,255,.03);
      --stroke:rgba(255,255,255,.12); --txt:#eef0ff; --muted:#9aa0c3;
      --a1:#ff2d75; --a2:#ff8a3d; --ok:#36d399; --warn:#fbbd23; --err:#ff5d6c; --run:#27c2ff;
    }
    [data-theme="light"] {
      --bg1:#fbeef3; --bg2:#ffe7d6; --panel:rgba(255,255,255,.7); --panel2:rgba(255,255,255,.5);
      --stroke:rgba(60,20,40,.12); --txt:#1a1020; --muted:#6a5260;
    }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; color:var(--txt); font-family:'Poppins',system-ui,Segoe UI,sans-serif;
      background:linear-gradient(135deg,var(--bg1),var(--bg2)); background-attachment:fixed; }
    a { color:var(--a2); }
    .wrap { max-width:1180px; margin:0 auto; padding:20px; }
    header { display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:18px; }
    header h1 { font-size:1.35rem; margin:0; }
    .pill { font-size:.7rem; padding:3px 9px; border-radius:999px; color:#ffd9c2;
      background:rgba(255,138,61,.16); border:1px solid rgba(255,138,61,.45); }
    .grow { flex:1; }
    .monitor { font-size:.78rem; color:var(--muted); display:flex; gap:14px; align-items:center; }
    .vbar { width:90px; height:7px; border-radius:6px; background:var(--panel2); overflow:hidden; border:1px solid var(--stroke); }
    .vbar > i { display:block; height:100%; background:linear-gradient(90deg,var(--ok),var(--warn)); width:0; }
    .iconbtn { background:var(--panel); border:1px solid var(--stroke); color:var(--txt); border-radius:10px; padding:7px 11px; cursor:pointer; font-size:.82rem; }
    .iconbtn:hover { border-color:var(--a1); }
    .cols { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
    @media(max-width:900px){ .cols{ grid-template-columns:1fr; } }
    .card { background:var(--panel); border:1px solid var(--stroke); border-radius:18px; padding:18px; backdrop-filter:blur(12px); box-shadow:0 16px 40px rgba(0,0,0,.28); }
    .card h2 { font-size:.95rem; margin:0 0 12px; display:flex; align-items:center; gap:8px; }
    label { display:block; font-size:.76rem; color:var(--muted); margin:12px 0 5px; font-weight:600; }
    label:first-of-type { margin-top:0; }
    textarea, select, input { width:100%; padding:11px 12px; border-radius:11px; font-size:.95rem; color:var(--txt); background:var(--panel2); border:1px solid var(--stroke); outline:none; transition:.15s; }
    textarea { resize:vertical; min-height:74px; }
    textarea:focus,select:focus,input:focus { border-color:var(--a1); box-shadow:0 0 0 3px rgba(255,45,117,.18); }
    .row { display:flex; gap:10px; } .row>div{ flex:1; }
    .rv { float:right; color:var(--a2); font-weight:700; }
    button.primary { margin-top:16px; width:100%; padding:13px; font-size:1rem; font-weight:700; cursor:pointer; color:#fff; border:none; border-radius:13px; background:linear-gradient(90deg,var(--a1),var(--a2)); transition:.15s; }
    button.primary:hover:not(:disabled){ transform:translateY(-1px); box-shadow:0 8px 24px rgba(255,80,90,.35); }
    button.primary:disabled{ opacity:.55; cursor:not-allowed; }
    .qhead { display:flex; gap:8px; align-items:center; margin-bottom:10px; flex-wrap:wrap; }
    .job { border:1px solid var(--stroke); border-radius:12px; padding:10px 12px; margin-bottom:9px; background:var(--panel2); }
    .job .top { display:flex; align-items:center; gap:8px; }
    .job .lbl { flex:1; font-size:.86rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .badge { font-size:.66rem; padding:2px 8px; border-radius:999px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; }
    .b-waiting{ background:rgba(154,160,195,.18); color:var(--muted); }
    .b-running{ background:rgba(39,194,255,.18); color:var(--run); }
    .b-completed{ background:rgba(54,211,153,.18); color:var(--ok); }
    .b-failed{ background:rgba(255,93,108,.18); color:var(--err); }
    .b-cancelled{ background:rgba(251,189,35,.16); color:var(--warn); }
    .pbar { height:6px; border-radius:6px; background:var(--panel); overflow:hidden; margin-top:8px; }
    .pbar > i { display:block; height:100%; background:linear-gradient(90deg,var(--a1),var(--a2)); width:0; transition:width .3s; }
    .jmeta { display:flex; justify-content:space-between; font-size:.7rem; color:var(--muted); margin-top:6px; }
    .jbtns { display:flex; gap:5px; }
    .mini { background:transparent; border:1px solid var(--stroke); color:var(--muted); border-radius:8px; padding:3px 7px; cursor:pointer; font-size:.72rem; }
    .mini:hover{ color:var(--txt); border-color:var(--a1); }
    video { width:100%; border-radius:12px; margin-top:10px; background:#000; }
    .toast { margin-top:10px; padding:9px 11px; border-radius:10px; font-size:.82rem; display:none; }
    .toast.err{ background:rgba(255,93,108,.14); border:1px solid var(--err); color:#ffd2d6; }
    .toast.ok{ background:rgba(54,211,153,.14); border:1px solid var(--ok); color:#c8ffe8; }
    .hint { font-size:.72rem; color:var(--muted); margin-top:6px; }
    .empty { text-align:center; color:var(--muted); font-size:.85rem; padding:18px 0; }
    body.compact .card{ padding:12px; } body.compact textarea{ min-height:54px; } body.compact .job{ padding:7px 9px; }
    footer{ text-align:center; color:var(--muted); font-size:.76rem; margin:18px 0 6px; }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🎬 AI Shorts Studio</h1>
    <span class="pill">Wan 2.2 · FLUX2 → I2V</span>
    <div class="grow"></div>
    <div class="monitor" id="monitor"><span id="gpuName">GPU…</span><span class="vbar"><i id="vbar"></i></span><span id="vramTxt"></span></div>
    <button class="iconbtn" id="themeBtn">🌙/☀️</button>
    <button class="iconbtn" id="compactBtn">⤢ compact</button>
  </header>

  <div class="cols">
    <div class="card">
      <h2>✨ Create</h2>
      <label for="idea">Idea</label>
      <textarea id="idea" placeholder="Ex: la motivation à ne jamais abandonner"></textarea>
      <div class="row">
        <div><label for="voice">Voice / language</label>
          <select id="voice">
            <option value="fr">🇫🇷 Français (homme)</option>
            <option value="fr-female">🇫🇷 Français (femme)</option>
            <option value="en">🇬🇧 English</option>
            <option value="es">🇪🇸 Español</option>
          </select></div>
        <div><label for="priority">Priority <span class="rv" id="prioVal">0</span></label>
          <input id="priority" type="range" min="0" max="5" step="1" value="0" /></div>
      </div>
      <label for="duration">Duration <span class="rv" id="durVal">20s</span></label>
      <input id="duration" type="range" min="5" max="90" step="1" value="20" />
      <button class="primary" id="addBtn">➕ Add to queue</button>
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
        <button class="mini" id="savePreset">💾 Save preset</button>
        <select id="presetSel" style="flex:1"><option value="">— presets —</option></select>
        <button class="mini" id="delPreset">🗑</button>
      </div>

      <h2 style="margin-top:18px">♾️ Continue / extend</h2>
      <label for="contSel">Source clip (completed)</label>
      <select id="contSel"><option value="">— newest completed —</option></select>
      <div class="row">
        <div><label for="segs">Segments</label>
          <select id="segs"><option>1</option><option>3</option><option>5</option><option>10</option></select></div>
        <div><label for="segDur">Seg. duration <span class="rv" id="segDurVal">5s</span></label>
          <input id="segDur" type="range" min="3" max="10" step="1" value="5" /></div>
      </div>
      <label style="display:flex;align-items:center;gap:8px;margin-top:10px"><input type="checkbox" id="smooth" style="width:auto"> Smooth seams (interpolation, slower)</label>
      <button class="primary" id="contBtn" style="background:linear-gradient(90deg,#ff8a3d,#36d399)">♾️ Extend video</button>
      <div class="toast" id="toast"></div>
    </div>

    <div class="card">
      <h2>🗂 Queue <span id="qcount" style="font-size:.78rem;color:var(--muted)"></span></h2>
      <div class="qhead">
        <button class="mini" id="pauseBtn">⏸ Pause</button>
        <button class="mini" id="resumeBtn">▶️ Resume</button>
        <button class="mini" id="cancelAllBtn">⏹ Cancel all</button>
        <button class="mini" id="clearBtn">🧹 Clear finished</button>
        <span class="grow"></span>
        <span id="avgTxt" style="font-size:.72rem;color:var(--muted)"></span>
      </div>
      <div id="jobs"><div class="empty">Queue empty — add a job.</div></div>
      <h2 style="margin-top:14px">▶️ Preview</h2>
      <video id="preview" controls playsinline style="display:none"></video>
      <div id="previewActions" style="display:none;gap:8px;margin-top:8px">
        <a class="mini" id="dlLink" download>⬇️ Download</a>
        <button class="mini" id="extendThis">♾️ Continue this</button>
      </div>
      <div class="empty" id="previewEmpty">Completed clips appear here.</div>
    </div>
  </div>
  <footer>⚡ Local · Ollama + FLUX2 + Wan 2.2 (ComfyUI) + SAPI + ffmpeg · single GPU</footer>
</div>

<script>
const $ = (id) => document.getElementById(id);
const api = (u, o) => fetch(u, o).then(r => r.json());
let lastSnap = { jobs: [] };

$("themeBtn").onclick = () => { const t = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark"; document.documentElement.setAttribute("data-theme", t); localStorage.setItem("theme", t); };
if (localStorage.getItem("theme")) document.documentElement.setAttribute("data-theme", localStorage.getItem("theme"));
$("compactBtn").onclick = () => { document.body.classList.toggle("compact"); localStorage.setItem("compact", document.body.classList.contains("compact")); };
if (localStorage.getItem("compact") === "true") document.body.classList.add("compact");

$("duration").oninput = e => $("durVal").textContent = e.target.value + "s";
$("segDur").oninput = e => $("segDurVal").textContent = e.target.value + "s";
$("priority").oninput = e => $("prioVal").textContent = e.target.value;

function toast(msg, kind="ok"){ const t=$("toast"); t.className="toast "+kind; t.textContent=msg; t.style.display="block"; setTimeout(()=>t.style.display="none",4000); }

function loadPresets(){ const p=JSON.parse(localStorage.getItem("presets_wan")||"{}"); const sel=$("presetSel"); sel.innerHTML='<option value="">— presets —</option>'+Object.keys(p).map(n=>`<option>${n}</option>`).join(""); return p; }
$("savePreset").onclick=()=>{ const name=prompt("Preset name?"); if(!name)return; const p=loadPresets(); p[name]={idea:$("idea").value,voice:$("voice").value,duration:$("duration").value,priority:$("priority").value}; localStorage.setItem("presets_wan",JSON.stringify(p)); loadPresets(); toast("Preset saved"); };
$("presetSel").onchange=e=>{ const p=loadPresets()[e.target.value]; if(!p)return; $("idea").value=p.idea; $("voice").value=p.voice; $("duration").value=p.duration; $("durVal").textContent=p.duration+"s"; $("priority").value=p.priority; $("prioVal").textContent=p.priority; };
$("delPreset").onclick=()=>{ const n=$("presetSel").value; if(!n)return; const p=loadPresets(); delete p[n]; localStorage.setItem("presets_wan",JSON.stringify(p)); loadPresets(); };
loadPresets();

$("addBtn").onclick=async()=>{
  const idea=$("idea").value.trim(); if(!idea)return toast("Enter an idea first","err");
  const body={idea,voice:$("voice").value,duration:Number($("duration").value),priority:Number($("priority").value)};
  $("addBtn").disabled=true;
  try{ const r=await api("/generate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}); if(r.error)throw new Error(r.error); toast("Queued ✓"); }
  catch(e){ toast(e.message,"err"); } finally{ $("addBtn").disabled=false; }
};
async function startContinue(seedVideoUrl){
  const body={ seedVideoUrl, idea:$("idea").value.trim()||"seamless continuation of the previous shot", segments:Number($("segs").value), segDurationSec:Number($("segDur").value), smooth:$("smooth").checked };
  try{ const r=await api("/continue",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}); if(r.error)throw new Error(r.error); toast(`Extension queued (+${body.segments}) ✓`); }
  catch(e){ toast(e.message,"err"); }
}
$("contBtn").onclick=()=>{ const url=$("contSel").value||newestCompleted(); if(!url)return toast("No completed clip to extend","err"); startContinue(url); };
$("extendThis").onclick=()=>{ const url=$("preview").dataset.url; if(url)startContinue(url); };
function newestCompleted(){ const c=lastSnap.jobs.filter(j=>j.status==="completed"&&j.result?.videoUrl); return c.length?c[c.length-1].result.videoUrl:""; }

$("pauseBtn").onclick=()=>fetch("/queue/pause",{method:"POST"});
$("resumeBtn").onclick=()=>fetch("/queue/resume",{method:"POST"});
$("cancelAllBtn").onclick=()=>fetch("/queue/cancel-all",{method:"POST"});
$("clearBtn").onclick=()=>fetch("/queue/clear-finished",{method:"POST"});
const jobAction=(id,act,body)=>fetch(`/queue/${id}/${act}`,{method:"POST",headers:{"Content-Type":"application/json"},body:body?JSON.stringify(body):undefined});
window.jobAction=jobAction;

function render(snap){
  lastSnap=snap; const jobs=snap.jobs||[];
  $("qcount").textContent=jobs.length?`(${jobs.filter(j=>j.status==="running").length} running, ${jobs.filter(j=>j.status==="waiting").length} waiting)`:"";
  $("avgTxt").textContent=snap.avgSec?`~${snap.avgSec}s avg/job`:"";
  $("pauseBtn").style.opacity=snap.paused?.5:1; $("resumeBtn").style.opacity=snap.paused?1:.5;
  const done=jobs.filter(j=>j.status==="completed"&&j.result?.videoUrl);
  $("contSel").innerHTML='<option value="">— newest completed —</option>'+done.map(j=>`<option value="${j.result.videoUrl}">${(j.label||j.id).slice(0,40)}</option>`).join("");
  const box=$("jobs");
  if(!jobs.length){ box.innerHTML='<div class="empty">Queue empty — add a job.</div>'; }
  else { box.innerHTML=jobs.slice().reverse().map(j=>{
    const pct=j.progress?.pct||0, stage=j.progress?.stage||"";
    const eta=j.status==="waiting"&&j.etaSec?`ETA ~${j.etaSec}s`:"";
    const ctrl=j.status==="waiting"?`<button class="mini" onclick="jobAction('${j.id}','reorder',{direction:'up'})">↑</button><button class="mini" onclick="jobAction('${j.id}','reorder',{direction:'down'})">↓</button><button class="mini" onclick="jobAction('${j.id}','cancel')">✕</button>`
      : j.status==="running"?`<button class="mini" onclick="jobAction('${j.id}','cancel')">⏹ stop</button>`
      : `<button class="mini" onclick="jobAction('${j.id}','remove')">🗑</button>`;
    const bar=(j.status==="running"||j.status==="waiting")?`<div class="pbar"><i style="width:${pct}%"></i></div>`:"";
    const err=j.error?`<div class="jmeta" style="color:var(--err)">${j.error}</div>`:"";
    return `<div class="job"><div class="top"><span class="badge b-${j.status}">${j.status}</span><span class="lbl" title="${(j.label||'').replace(/"/g,'')}">${j.label||j.id}</span><span class="jbtns">${ctrl}</span></div>${bar}<div class="jmeta"><span>${stage}${j.attempts?` · retry ${j.attempts}`:""}</span><span>${eta}</span></div>${err}</div>`;
  }).join(""); }
  const latest=done[done.length-1];
  if(latest){ const v=$("preview"); if(v.dataset.url!==latest.result.videoUrl){ v.dataset.url=latest.result.videoUrl; v.src=latest.result.videoUrl+"?t="+Date.now(); v.style.display="block"; $("previewActions").style.display="flex"; $("previewEmpty").style.display="none"; $("dlLink").href=latest.result.videoUrl; } }
}

function connect(){ try{ const es=new EventSource("/events"); es.onmessage=e=>{ try{ render(JSON.parse(e.data)); }catch{} }; es.onerror=()=>{ es.close(); setTimeout(poll,2000); }; }catch{ poll(); } }
async function poll(){ try{ render(await api("/queue")); }catch{} setTimeout(poll,2500); }
connect();

async function monitor(){ try{ const s=await api("/api/stats"); $("gpuName").textContent=s.gpu||"GPU"; if(s.ok&&s.vramTotal){ const used=s.vramUsed/s.vramTotal*100; $("vbar").style.width=used+"%"; $("vramTxt").textContent=`${(s.vramUsed/1e9).toFixed(1)}/${(s.vramTotal/1e9).toFixed(0)}GB`; } else { $("vramTxt").textContent=""; $("vbar").style.width="0"; } }catch{} setTimeout(monitor,4000); }
monitor();
</script>
</body>
</html>
