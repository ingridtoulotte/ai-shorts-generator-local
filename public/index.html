<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎬 AI Shorts Generator</title>
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/847/847969.png" />
  <style>
    :root {
      --bg1:#0b0d1a; --bg2:#161a33; --card:rgba(255,255,255,.06);
      --stroke:rgba(255,255,255,.12); --txt:#eef0ff; --muted:#9aa0c3;
      --accent1:#ff2d75; --accent2:#ff8a3d; --ok:#36d399; --err:#ff5d6c;
    }
    * { box-sizing:border-box; }
    body {
      font-family:'Poppins',system-ui,Segoe UI,sans-serif; color:var(--txt);
      margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      padding:24px;
      background:linear-gradient(135deg,var(--bg1),var(--bg2));
      background-size:200% 200%; animation:drift 18s ease infinite;
    }
    @keyframes drift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    .wrap { width:100%; max-width:520px; }
    .brand { text-align:center; margin-bottom:18px; }
    .brand h1 { font-size:1.7rem; margin:0; font-weight:700; letter-spacing:.3px; }
    .brand p { margin:6px 0 0; color:var(--muted); font-size:.92rem; }
    .card {
      background:var(--card); border:1px solid var(--stroke); border-radius:20px;
      padding:24px; backdrop-filter:blur(14px); box-shadow:0 20px 60px rgba(0,0,0,.45);
    }
    label { display:block; font-size:.82rem; color:var(--muted); margin:14px 0 6px; font-weight:600; }
    label:first-of-type { margin-top:0; }
    textarea, select, input {
      width:100%; padding:13px 14px; border-radius:12px; font-size:1rem; color:var(--txt);
      background:rgba(0,0,0,.25); border:1px solid var(--stroke); outline:none; transition:.2s;
    }
    textarea { resize:vertical; min-height:86px; }
    textarea:focus, select:focus, input:focus { border-color:var(--accent1); box-shadow:0 0 0 3px rgba(255,45,117,.18); }
    .row { display:flex; gap:12px; }
    .row > div { flex:1; }
    .range-val { float:right; color:var(--accent2); font-weight:700; }
    button {
      margin-top:20px; width:100%; padding:14px; font-size:1.05rem; font-weight:700; cursor:pointer;
      color:#fff; border:none; border-radius:14px;
      background:linear-gradient(90deg,var(--accent1),var(--accent2)); transition:.2s;
    }
    button:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 10px 30px rgba(255,80,90,.35); }
    button:disabled { opacity:.6; cursor:not-allowed; }
    .status { margin-top:16px; min-height:22px; text-align:center; font-size:.9rem; color:var(--muted); }
    .bar { margin-top:12px; height:6px; border-radius:6px; background:rgba(255,255,255,.08); overflow:hidden; display:none; }
    .bar > i { display:block; height:100%; width:30%; border-radius:6px;
      background:linear-gradient(90deg,var(--accent1),var(--accent2)); animation:slide 1.2s ease-in-out infinite; }
    @keyframes slide { 0%{margin-left:-30%} 100%{margin-left:100%} }
    video { width:100%; border-radius:14px; margin-top:16px; display:none; background:#000; }
    .actions { display:none; gap:10px; margin-top:10px; }
    .actions a { flex:1; text-align:center; text-decoration:none; padding:10px; border-radius:10px;
      border:1px solid var(--stroke); color:var(--txt); font-size:.88rem; background:rgba(255,255,255,.04); }
    .toast { margin-top:12px; padding:10px 12px; border-radius:10px; font-size:.88rem; display:none; }
    .toast.err { background:rgba(255,93,108,.14); border:1px solid var(--err); color:#ffd2d6; }
    footer { text-align:center; margin-top:18px; font-size:.8rem; color:var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <h1>🎬 AI Shorts Generator</h1>
      <p>100% local · script → voix → vidéo · aucune clé API</p>
    </div>

    <div class="card">
      <label for="idea">💡 Idée du short</label>
      <textarea id="idea" placeholder="Ex : la motivation à ne jamais abandonner"></textarea>

      <div class="row">
        <div>
          <label for="voice">🎤 Langue / voix</label>
          <select id="voice">
            <option value="fr">🇫🇷 Français (homme)</option>
            <option value="fr-female">🇫🇷 Français (femme)</option>
            <option value="en">🇬🇧 English</option>
            <option value="es">🇪🇸 Español</option>
          </select>
        </div>
        <div>
          <label for="duration">⏱ Durée <span class="range-val" id="durVal">20s</span></label>
          <input id="duration" type="range" min="10" max="90" step="1" value="20" />
        </div>
      </div>

      <button id="generateBtn">🚀 Générer le short</button>
      <div class="bar" id="bar"><i></i></div>
      <div class="status" id="status"></div>
      <div class="toast err" id="toast"></div>

      <video id="resultVideo" controls playsinline></video>
      <div class="actions" id="actions">
        <a id="dlLink" download>⬇️ Télécharger</a>
        <a id="againLink" href="#">🔁 Nouveau</a>
      </div>
    </div>

    <footer>⚡ Local pipeline · Ollama + SAPI + ffmpeg</footer>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const btn = $("generateBtn"), bar = $("bar"), status = $("status"),
          toast = $("toast"), video = $("resultVideo"), actions = $("actions"),
          durInput = $("duration"), durVal = $("durVal");

    durInput.addEventListener("input", () => durVal.textContent = durInput.value + "s");

    const STEPS = ["Écriture du script…", "Découpage en scènes…", "Synthèse de la voix…",
                   "Génération des images…", "Assemblage de la vidéo…"];
    let stepTimer = null;
    function runProgress() {
      let i = 0; status.textContent = STEPS[0];
      stepTimer = setInterval(() => { i = Math.min(i + 1, STEPS.length - 1); status.textContent = STEPS[i]; }, 4500);
    }
    function stopProgress() { clearInterval(stepTimer); stepTimer = null; }

    $("againLink").addEventListener("click", (e) => {
      e.preventDefault(); video.style.display = "none"; actions.style.display = "none";
      status.textContent = ""; $("idea").focus();
    });

    btn.addEventListener("click", async () => {
      const idea = $("idea").value.trim();
      const voice = $("voice").value;
      const duration = Number(durInput.value);
      toast.style.display = "none";
      if (!idea) { toast.textContent = "Entre une idée d'abord 🙂"; toast.style.display = "block"; return; }

      btn.disabled = true; bar.style.display = "block"; video.style.display = "none";
      actions.style.display = "none"; runProgress();

      try {
        const res = await fetch("/generate", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ idea, voice, duration }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "Erreur serveur");
        if (!data.videoUrl) throw new Error("Aucune vidéo générée");

        stopProgress(); status.textContent = "✅ Prêt !";
        video.src = data.videoUrl + "?t=" + Date.now();
        video.style.display = "block";
        $("dlLink").href = data.videoUrl;
        actions.style.display = "flex";
      } catch (err) {
        stopProgress(); status.textContent = "";
        toast.textContent = "❌ " + err.message; toast.style.display = "block";
      } finally {
        btn.disabled = false; bar.style.display = "none";
      }
    });
  </script>
</body>
</html>
